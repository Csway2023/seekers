<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="referrer" content="no-referrer" />
  <title>Asia Globe</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: linear-gradient(to bottom, #002FA7 0%, #0052FF 100%);
      color: #fff;
      font-family:
        Inter, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei",
        sans-serif;
    }

    .stage {
      position: relative;
      width: 100vw;
      height: 100vh;
      min-height: 720px;
      --globe-size: 600px;
      --card-width: 460px;
      --card-stack-gap: 14px;
      --card-margin: 56px;
      --card-gap: 40px;
    }

    canvas {
      position: absolute;
      top: 50%;
      left: calc((100vw - var(--card-width) - var(--card-margin) - var(--card-gap)) / 2);
      display: block;
      width: var(--globe-size);
      height: var(--globe-size);
      cursor: default;
      touch-action: none;
      transform: translate(-50%, -50%);
    }

    .card-column {
      position: absolute;
      top: 50%;
      width: var(--card-width);
      display: flex;
      flex-direction: column;
      gap: var(--card-stack-gap);
      transform: translateY(-50%);
      pointer-events: none;
    }

    .card-column--right {
      right: var(--card-margin);
    }

    .hub-card {
      position: relative;
      width: 100%;
      padding: 16px 26px;
      border: 1px solid rgba(255, 255, 255, 0.7);
      border-radius: 22px;
      background:
        linear-gradient(rgba(255, 255, 255, 0.12), rgba(255, 255, 255, 0.06)),
        linear-gradient(to bottom, #002FA7 0%, #0052FF 100%) fixed;
      box-shadow:
        0 16px 40px rgba(0, 0, 0, 0.22),
        inset 0 1px 0 rgba(255, 255, 255, 0.16);
      opacity: 0;
      pointer-events: auto;
      cursor: pointer;
      transform: translateY(12px);
      transition:
        opacity 320ms ease,
        transform 420ms cubic-bezier(0.22, 1, 0.36, 1),
        border-color 280ms ease,
        box-shadow 280ms ease;
    }

    .hub-card.is-visible {
      opacity: 1;
      transform: translateY(0);
    }

    .hub-card.is-open {
      border-color: #ffffff;
      box-shadow:
        0 24px 58px rgba(0, 0, 0, 0.32),
        inset 0 1px 0 rgba(255, 255, 255, 0.22);
    }

    .hub-card__eyebrow {
      margin: 0 0 6px;
      color: rgba(255, 255, 255, 0.68);
      font-size: 12px;
      letter-spacing: 4px;
      text-transform: uppercase;
    }

    .hub-card__title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin: 0;
      font-size: 21px;
      line-height: 1.3;
      font-weight: 700;
    }

    .hub-card__chevron {
      flex: 0 0 auto;
      color: rgba(255, 255, 255, 0.7);
      font-size: 18px;
      line-height: 1;
      transition: transform 360ms cubic-bezier(0.22, 1, 0.36, 1), opacity 280ms ease;
    }

    .hub-card.is-open .hub-card__chevron {
      transform: rotate(90deg);
      opacity: 1;
    }

    .hub-card__body {
      max-height: 0;
      margin-top: 0;
      opacity: 0;
      overflow: hidden;
      transition:
        max-height 460ms cubic-bezier(0.22, 1, 0.36, 1),
        margin-top 360ms ease,
        opacity 300ms ease;
    }

    .hub-card.is-open .hub-card__body {
      max-height: 320px;
      margin-top: 12px;
      opacity: 1;
    }

    .hub-card__description {
      display: -webkit-box;
      margin: 0 0 10px;
      overflow: hidden;
      color: rgba(255, 255, 255, 0.82);
      font-size: 13px;
      line-height: 1.7;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 3;
      line-clamp: 3;
    }

    .hub-card__label {
      margin: 0 0 4px;
      color: rgba(255, 255, 255, 0.78);
      font-size: 12px;
    }

    .hub-card__address {
      display: block;
      margin: 0 0 12px;
      color: rgba(255, 255, 255, 0.9);
      font-size: 12px;
      line-height: 1.45;
      word-break: keep-all;
      overflow-wrap: anywhere;
    }

    .hub-card__link {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      padding-top: 11px;
      border-top: 1px solid rgba(255, 255, 255, 0.28);
      color: rgba(255, 255, 255, 0.9);
      font-size: 12px;
      letter-spacing: 1px;
      text-decoration: none;
    }

    .hub-card__arrow {
      font-size: 18px;
      line-height: 1;
    }

    @media (max-width: 1180px) {
      .stage {
        min-height: 100vh;
        --globe-size: min(420px, 64vw);
        --card-margin: 16px;
      }

      canvas {
        top: 22%;
        left: 50%;
        transform: translate(-50%, -50%);
      }

      .card-column {
        top: auto;
        bottom: 20px;
        left: 16px;
        right: 16px;
        width: auto;
        max-height: 48vh;
        overflow: auto;
        transform: none;
      }
    }
  </style>
</head>
<body>
  <main class="stage">
    <canvas id="globe" width="640" height="640"></canvas>
    <section class="card-column card-column--right" id="rightCardLayer" aria-live="polite"></section>
  </main>

  <script src="d3.min.js"></script>
  <script src="topojson-client.min.js"></script>

  <script>
    const canvas = document.getElementById("globe")
    const context = canvas.getContext("2d")
    const rightCardLayer = document.getElementById("rightCardLayer")

    const width = canvas.width
    const height = canvas.height

    const cityMarkers = [
      { name: "北京", lng: 116.4074, lat: 39.9042, region: "northChina" },
      { name: "深圳", lng: 114.0579, lat: 22.5431, region: "southChina" },
      { name: "上海", lng: 121.4737, lat: 31.2304, region: "eastChina" },
      { name: "重庆", lng: 106.5516, lat: 29.563, region: "southwestChina" },
      { name: "新加坡", lng: 103.8198, lat: 1.3521, region: "overseas" },
    ]

    const regionProvinceNames = {
      northChina: [
        "北京",
        "天津",
        "河北",
        "河南",
        "山东",
        "山西",
        "内蒙古",
        "辽宁",
        "吉林",
        "黑龙江",
      ],
      eastChina: ["上海", "江苏", "浙江", "安徽", "台湾"],
      southChina: ["广东", "广西", "湖南", "湖北", "香港", "澳门"],
      southwestChina: ["重庆", "四川", "云南", "贵州", "西藏"],
    }

    const regionCityNames = {
      northChina: "北京",
      eastChina: "上海",
      southChina: "深圳",
      southwestChina: "重庆",
      overseas: "新加坡",
    }

    const cityCards = {
      北京: {
        side: "right",
        slot: "top",
        eyebrow: "NORTH CHINA HUB",
        title: "北京总部・华北地区",
        description:
          "北京雪格专注于互动体验空间的策划、设计、实施、运营，提供多媒体展厅的一体化解决方案，满足客户的企业形象、品牌推广...",
        address: "北京市朝阳区酒仙桥路10号恒通国际商务园B36C座一层 107室",
        cta: "进入 北京总部・华北地区",
        url: "https://seekers.com.cn/location/beijing",
      },
      重庆: {
        side: "left",
        slot: "top",
        eyebrow: "WEST CHINA HUB",
        title: "重庆总部・西南地区",
        description:
          "立足重庆两江新区，聚焦智能制造、智慧出行与科技体验空间的深度融合。依托西南产业基础与数字化创新能力，连接研发、制造...",
        address: "重庆市两江新区香港置地光环中心 4幢 806室",
        cta: "进入 重庆总部・西南地区",
        url: "https://seekers.com.cn/location/chongqing",
      },
      上海: {
        side: "right",
        slot: "middle",
        eyebrow: "EAST CHINA HUB",
        title: "上海总部・华东地区",
        description:
          "立足上海核心商务区，聚焦科技品牌、数字内容与未来体验空间的一体化实践。依托国际化视野与前沿设计能力，链接长三角产业...",
        address: "上海市浦东新区花园石桥路33号花旗银行大厦 1801室",
        cta: "进入 上海总部・华东地区",
        url: "https://seekers.com.cn/location/shanghai",
      },
      深圳: {
        side: "right",
        slot: "bottom",
        eyebrow: "SOUTH CHINA HUB",
        title: "深圳总部・华南地区",
        description:
          "雪格空间智造科技（深圳）有限责任公司聚焦三大核心服务方向，精准匹配各类企业展厅定制需求，主打高科技展厅与总部体验中...",
        address: "深圳市南山区太子路5号新时代广场（二期）1号楼 1103室",
        cta: "进入 深圳总部・华南地区",
        url: "https://seekers.com.cn/location/shenzhen",
      },
      新加坡: {
        side: "left",
        slot: "bottom",
        eyebrow: "OVERSEAS HUB",
        title: "新加坡总部・海外地区",
        description:
          "新加坡分中心面向海外市场，连接亚太区域的科技品牌、数字内容与体验空间服务需求。以国际化项目管理、跨区域协同与沉浸式...",
        address: "Singapore",
        cta: "进入 新加坡总部・海外地区",
        url: "https://seekers.com.cn/location/singapore",
      },
    }

    const centerLng = (116.4074 + 103.8198) / 2
    const centerLat = (39.9042 + 1.3521) / 2

    const defaultRotation = [-centerLng, -centerLat, 0]
    let currentRotation = [...defaultRotation]
    let targetRotation = [...defaultRotation]

    let landFeatures = null
    let countryFeatures = []
    let chinaFeature = null
    let nonChinaFeatures = []
    let provinceFeatures = []
    let oceanGraticuleSegments = []
    let allDots = []
    let mouse = { x: -1000, y: -1000 }
    const activeCityNames = new Set()
    const activeRegionNames = new Set()
    let hoveredRegionName = null

    function createOceanGraticuleSegments(land) {
      const graticule = d3.geoGraticule().step([15, 15])
      const lines = graticule.lines()
      const segments = []

      lines.forEach((line) => {
        const coordinates = line.coordinates
        let oceanSegment = []

        function pushSegment() {
          if (oceanSegment.length < 2) return
          segments.push([...oceanSegment])
          oceanSegment = []
        }

        coordinates.forEach((coord) => {
          const isOnLand = land.features.some((feature) =>
            d3.geoContains(feature, coord)
          )

          if (isOnLand) {
            pushSegment()
          } else {
            oceanSegment.push(coord)
          }
        })

        pushSegment()
      })

      return segments
    }

    function renderOceanGraticule(path) {
      oceanGraticuleSegments.forEach((segment) => {
        context.beginPath()
        path({
          type: "LineString",
          coordinates: segment,
        })
        context.strokeStyle = "rgba(255, 255, 255, 0.1)"
        context.lineWidth = 0.8
        context.stroke()
      })
    }

    function normalizeProvinceName(name) {
      return String(name || "")
        .replace(/特别行政区|壮族自治区|回族自治区|维吾尔自治区|自治区|省|市/g, "")
        .trim()
    }

    function getProvinceName(feature) {
      return normalizeProvinceName(
        feature.properties?.name ||
          feature.properties?.fullname ||
          feature.properties?.NAME
      )
    }

    function isRenderableFeature(feature) {
      return Boolean(
        feature &&
          feature.type === "Feature" &&
          feature.geometry &&
          feature.geometry.coordinates
      )
    }

    function reverseGeometryRings(geometry) {
      if (!geometry) return geometry

      if (geometry.type === "Polygon") {
        return {
          ...geometry,
          coordinates: geometry.coordinates.map((ring) => [...ring].reverse()),
        }
      }

      if (geometry.type === "MultiPolygon") {
        return {
          ...geometry,
          coordinates: geometry.coordinates.map((polygon) =>
            polygon.map((ring) => [...ring].reverse())
          ),
        }
      }

      return geometry
    }

    function normalizeSphericalPolygon(feature) {
      const normalizedFeature = {
        ...feature,
        properties: { ...(feature.properties || {}) },
        geometry: {
          ...feature.geometry,
          coordinates: JSON.parse(JSON.stringify(feature.geometry.coordinates)),
        },
      }

      if (d3.geoArea(normalizedFeature) > Math.PI * 2) {
        normalizedFeature.geometry = reverseGeometryRings(normalizedFeature.geometry)
      }

      return normalizedFeature
    }

    function getActiveProvinceNames() {
      const names = new Set()

      activeRegionNames.forEach((regionName) => {
        const provinceNames = regionProvinceNames[regionName]
        if (!provinceNames) return

        provinceNames.forEach((provinceName) => {
          names.add(provinceName)
        })
      })

      return names
    }

    function getRegionProvinceFeatures(regionName) {
      const provinceNames = regionProvinceNames[regionName]
      if (!provinceNames) return []

      return provinceFeatures.filter((feature) => {
        return provinceNames.includes(getProvinceName(feature))
      })
    }

    function isCoordinateVisible(coordinates) {
      const center = [-currentRotation[0], -currentRotation[1]]
      return d3.geoDistance(coordinates, center) <= Math.PI / 2
    }

    function getRegionAtCoordinates(coordinates) {
      if (!coordinates || !isCoordinateVisible(coordinates)) return null

      for (const regionName of Object.keys(regionProvinceNames)) {
        const regionFeatures = getRegionProvinceFeatures(regionName)
        const isInRegion = regionFeatures.some((feature) =>
          d3.geoContains(feature, coordinates)
        )

        if (isInRegion) return regionName
      }

      const isOverseas = nonChinaFeatures.some((feature) =>
        d3.geoContains(feature, coordinates)
      )

      return isOverseas ? "overseas" : null
    }

    function renderRegionHighlights(path) {
      if (activeRegionNames.size === 0) return

      if (activeRegionNames.has("overseas")) {
        context.beginPath()
        nonChinaFeatures.forEach((feature) => {
          path(feature)
        })
        context.fillStyle = hoveredRegionName === "overseas" ? "#0052FF" : "#71B4FF"
        context.fill()

        if (hoveredRegionName === "overseas") {
          context.beginPath()
          nonChinaFeatures.forEach((feature) => {
            path(feature)
          })
          context.strokeStyle = "#FFFFFF"
          context.lineWidth = 1.8
          context.stroke()
        }
      }

      if (!chinaFeature) return

      context.save()
      context.beginPath()
      path(chinaFeature)
      context.clip()

      activeRegionNames.forEach((regionName) => {
        if (!regionProvinceNames[regionName]) return

        getRegionProvinceFeatures(regionName).forEach((feature) => {
          if (!isRenderableFeature(feature)) return

          context.beginPath()
          path(feature)
          context.fillStyle = hoveredRegionName === regionName ? "#0052FF" : "#71B4FF"
          context.fill()

          if (hoveredRegionName === regionName) {
            context.strokeStyle = "#FFFFFF"
            context.lineWidth = 1.8
            context.stroke()
          }
        })
      })

      context.restore()
    }

    function renderChinaOutline(path) {
      if (!chinaFeature) return

      context.beginPath()
      path(chinaFeature)
      context.strokeStyle = "rgba(255, 255, 255, 0.95)"
      context.lineWidth = 1.4
      context.stroke()
    }

    function createPageAlignedGradient() {
      const rect = canvas.getBoundingClientRect()
      const viewportHeight = window.innerHeight || height
      const gradient = context.createLinearGradient(
        0,
        -rect.top,
        0,
        viewportHeight - rect.top
      )

      gradient.addColorStop(0, "#002FA7")
      gradient.addColorStop(1, "#0052FF")

      return gradient
    }

    function render() {
      const radius = Math.min(width, height) / 2 - 20

      const projection = d3
        .geoOrthographic()
        .scale(radius)
        .translate([width / 2, height / 2])
        .rotate(currentRotation)
        .clipAngle(90)

      const path = d3.geoPath().projection(projection).context(context)

      context.clearRect(0, 0, width, height)

      context.save()
      context.beginPath()
      context.arc(width / 2, height / 2, radius, 0, Math.PI * 2)
      context.clip()
      context.fillStyle = createPageAlignedGradient()
      context.fillRect(0, 0, width, height)
      context.restore()

      context.beginPath()
      context.arc(width / 2, height / 2, radius, 0, Math.PI * 2)
      context.strokeStyle = "#D9E7FF"
      context.lineWidth = 0.8
      context.stroke()

      if (!landFeatures) return

      renderOceanGraticule(path)

      context.beginPath()
      landFeatures.features.forEach((feature) => {
        path(feature)
      })
      context.fillStyle = "rgba(255, 255, 255, 0.3)"
      context.fill()

      renderRegionHighlights(path)

      context.beginPath()
      landFeatures.features.forEach((feature) => {
        path(feature)
      })
      context.strokeStyle = "#D9E7FF"
      context.lineWidth = 0.8
      context.stroke()

      renderChinaOutline(path)

      const maxInfluenceRadius = 80
      const maxScale = 2.5

      allDots.forEach((dot) => {
        if (!isCoordinateVisible([dot.lng, dot.lat])) return

        const projected = projection([dot.lng, dot.lat])
        if (!projected) return

        const x = projected[0]
        const y = projected[1]

        if (x < 0 || x > width || y < 0 || y > height) return

        const dx = x - mouse.x
        const dy = y - mouse.y
        const distance = Math.sqrt(dx * dx + dy * dy)

        let dotScale = 1

        if (distance < maxInfluenceRadius) {
          const t = 1 - distance / maxInfluenceRadius
          dotScale = 1 + (maxScale - 1) * t * t
        }

        context.beginPath()
        context.arc(x, y, 1.2 * dotScale, 0, Math.PI * 2)
        context.fillStyle = "#E0E0E0"
        context.fill()
      })

      cityMarkers.forEach((city) => {
        if (!isCoordinateVisible([city.lng, city.lat])) return

        const projected = projection([city.lng, city.lat])
        if (!projected) return

        const x = projected[0]
        const y = projected[1]

        if (x < 0 || x > width || y < 0 || y > height) return

        const dx = x - mouse.x
        const dy = y - mouse.y
        const distance = Math.sqrt(dx * dx + dy * dy)

        let cityScale = 1

        if (distance < maxInfluenceRadius) {
          const t = 1 - distance / maxInfluenceRadius
          cityScale = 1 + (maxScale - 1) * t * t
        }

        if (hoveredRegionName === city.region) {
          cityScale = Math.max(cityScale, 2.1)
        }

        context.beginPath()
        context.arc(x, y, 4.5 * cityScale, 0, Math.PI * 2)
        context.fillStyle = "#FFFFFF"
        context.fill()

        if (activeCityNames.has(city.name)) {
          context.beginPath()
          context.arc(x, y, 9.5 * cityScale, 0, Math.PI * 2)
          context.strokeStyle = "rgba(255, 255, 255, 0.85)"
          context.lineWidth = 1
          context.stroke()
        }
      })
    }

    function getProjection() {
      const radius = Math.min(width, height) / 2 - 20

      return d3
        .geoOrthographic()
        .scale(radius)
        .translate([width / 2, height / 2])
        .rotate(currentRotation)
        .clipAngle(90)
    }

    function isCityVisible(city) {
      const center = [-currentRotation[0], -currentRotation[1]]
      return d3.geoDistance([city.lng, city.lat], center) <= Math.PI / 2
    }

    function getCanvasPoint(event) {
      const rect = canvas.getBoundingClientRect()

      return {
        x: (event.clientX - rect.left) * (width / rect.width),
        y: (event.clientY - rect.top) * (height / rect.height),
      }
    }

    function findCityAtPoint(point) {
      const projection = getProjection()

      return cityMarkers.find((city) => {
        if (!isCityVisible(city)) return false

        const projected = projection([city.lng, city.lat])
        if (!projected) return false

        const dx = projected[0] - point.x
        const dy = projected[1] - point.y

        return Math.sqrt(dx * dx + dy * dy) <= 18
      })
    }

    function findCityByRegionAtPoint(point) {
      const projection = getProjection()
      const radius = Math.min(width, height) / 2 - 20
      const dx = point.x - width / 2
      const dy = point.y - height / 2

      if (Math.sqrt(dx * dx + dy * dy) > radius) return null

      const coordinates = projection.invert([point.x, point.y])
      const regionName = getRegionAtCoordinates(coordinates)

      if (!regionName) return null

      const cityName = regionCityNames[regionName]
      return cityMarkers.find((city) => city.name === cityName) || null
    }

    function findInteractiveCityAtPoint(point) {
      return findCityAtPoint(point) || findCityByRegionAtPoint(point)
    }

    function updateHoveredRegion(regionName) {
      hoveredRegionName = regionName

      cityMarkers.forEach((city) => {
        document
          .getElementById(`hubCard-${city.name}`)
          ?.classList.toggle("is-open", city.region === hoveredRegionName)
      })
    }

    const cardOrder = ["北京", "上海", "重庆", "深圳", "新加坡"]

    function openHubUrl(cityName) {
      const url = cityCards[cityName]?.url
      if (url) window.open(url, "_blank", "noopener")
    }

    function createCityCards() {
      cardOrder.forEach((cityName) => {
        const card = cityCards[cityName]
        if (!card) return

        const city = cityMarkers.find((marker) => marker.name === cityName)
        const article = document.createElement("article")
        article.className = "hub-card"
        article.id = `hubCard-${cityName}`
        article.dataset.city = cityName

        article.innerHTML = `
          <p class="hub-card__eyebrow"></p>
          <h2 class="hub-card__title">
            <span class="hub-card__title-text"></span>
            <span class="hub-card__chevron">→</span>
          </h2>
          <div class="hub-card__body">
            <p class="hub-card__description"></p>
            <p class="hub-card__label">总部地址</p>
            <p class="hub-card__address"></p>
            <a class="hub-card__link" target="_blank" rel="noopener">
              <span class="hub-card__cta"></span>
              <span class="hub-card__arrow">→</span>
            </a>
          </div>
        `

        article.querySelector(".hub-card__eyebrow").textContent = card.eyebrow
        article.querySelector(".hub-card__title-text").textContent = card.title
        article.querySelector(".hub-card__description").textContent =
          card.description
        article.querySelector(".hub-card__address").textContent = card.address
        article.querySelector(".hub-card__cta").textContent = card.cta

        const link = article.querySelector(".hub-card__link")
        if (card.url) link.href = card.url

        article.addEventListener("mouseenter", () => {
          updateHoveredRegion(city ? city.region : null)
        })
        article.addEventListener("mouseleave", () => {
          updateHoveredRegion(null)
        })
        article.addEventListener("click", (event) => {
          if (event.target.closest(".hub-card__link")) return
          openHubUrl(cityName)
        })

        rightCardLayer.appendChild(article)
      })
    }

    function showCityCard(cityName) {
      const card = cityCards[cityName]
      if (!card) return
      const city = cityMarkers.find((marker) => marker.name === cityName)

      activeCityNames.add(cityName)
      if (city) {
        activeRegionNames.add(city.region)
      }
      document
        .getElementById(`hubCard-${cityName}`)
        ?.classList.add("is-visible")
    }

    function showAllCityCards() {
      cityMarkers.forEach((city) => {
        showCityCard(city.name)
      })
    }

    function animate() {
      const ease = 0.14

      currentRotation[0] += (targetRotation[0] - currentRotation[0]) * ease
      currentRotation[1] += (targetRotation[1] - currentRotation[1]) * ease
      currentRotation[2] += (targetRotation[2] - currentRotation[2]) * ease

      render()
      requestAnimationFrame(animate)
    }

    canvas.addEventListener("mousemove", (event) => {
      const rect = canvas.getBoundingClientRect()
      const point = getCanvasPoint(event)

      const x = point.x
      const y = point.y

      mouse = { x, y }

      const normalizedX = (x / width - 0.5) * 2
      const normalizedY = (y / height - 0.5) * 2

      const maxLngOffset = 9
      const maxLatOffset = 5

      targetRotation = [
        defaultRotation[0] - normalizedX * maxLngOffset,
        Math.max(
          -90,
          Math.min(90, defaultRotation[1] + normalizedY * maxLatOffset)
        ),
        defaultRotation[2],
      ]

      const hoveredCity = findInteractiveCityAtPoint(point)
      updateHoveredRegion(hoveredCity ? hoveredCity.region : null)
      canvas.style.cursor = hoveredCity ? "pointer" : "default"
    })

    canvas.addEventListener("click", (event) => {
      const city = findInteractiveCityAtPoint(getCanvasPoint(event))

      if (city) {
        openHubUrl(city.name)
      }
    })

    canvas.addEventListener("mouseleave", () => {
      mouse = { x: -1000, y: -1000 }
      targetRotation = [...defaultRotation]
      updateHoveredRegion(null)
      canvas.style.cursor = "default"
    })

    createCityCards()
    showAllCityCards()

    async function loadWorldData() {
      try {
        const worldResponse = await fetch(
          "countries-110m.json"
        )
        const world = await worldResponse.json()

        landFeatures = topojson.feature(world, world.objects.land)
        countryFeatures = topojson.feature(world, world.objects.countries).features
        chinaFeature = countryFeatures.find((feature) => {
          return String(feature.id) === "156"
        })
        nonChinaFeatures = countryFeatures.filter((feature) => {
          return String(feature.id) !== "156"
        })
        oceanGraticuleSegments = createOceanGraticuleSegments(landFeatures)

        const dots = []
        const step = 2.5

        for (let lat = -90; lat <= 90; lat += step) {
          for (let lng = -180; lng <= 180; lng += step) {
            const point = [lng, lat]
            const isOnLand = landFeatures.features.some((feature) =>
              d3.geoContains(feature, point)
            )

            if (isOnLand) {
              dots.push({ lat, lng })
            }
          }
        }

        allDots = dots
      } catch (error) {
        console.error("Failed to load world data:", error)
      }
    }

    async function loadProvinceData() {
      try {
        const provinceResponse = await fetch(
          "https://geo.datav.aliyun.com/areas_v3/bound/100000_full.json"
        )
        const chinaProvinces = await provinceResponse.json()

        provinceFeatures = (chinaProvinces.features || [])
          .filter((feature) => {
            return isRenderableFeature(feature) && getProvinceName(feature)
          })
          .map(normalizeSphericalPolygon)
      } catch (error) {
        console.error("Failed to load province data:", error)
      }
    }

    loadWorldData()
    loadProvinceData()
    animate()
  </script>
